name: Daily News Build & Deploy

on:
  schedule:
    # Runs at 23:00 UTC every day = 07:00 Beijing time (UTC+8)
    - cron: '0 23 * * *'
  workflow_dispatch:  # Allow manual trigger

# Prevent concurrent runs — cancel old ones when new one starts
concurrency:
  group: pages-deploy
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bundle data into JS module
        run: node scripts/bundle-data.cjs

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
