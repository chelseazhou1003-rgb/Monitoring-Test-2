name: Daily News Build & Deploy

on:
  push:
    branches: [main]
  schedule:
    # Runs at 23:00 UTC every day = 07:00 Beijing time (UTC+8)
    - cron: '0 23 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write
  deployments: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Bundle data into JS module
        run: node scripts/bundle-data.cjs

      - name: Commit updated data (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/data/ site/assets/js/data.js
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Update news data — $(date +'%Y-%m-%d')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
